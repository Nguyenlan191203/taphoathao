<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin đơn hàng</title>
<style>
body{margin:0;font-family:Arial;background:#f4f8f2}
header{background:#00843d;color:white;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
button{border:0;padding:10px 16px;border-radius:20px;font-weight:bold;cursor:pointer;margin:4px}
.green{background:#00843d;color:white}.yellow{background:#ffd43b}.red{background:#dc2626;color:white}
.container{margin:30px 40px}
.login,.order{background:white;border-radius:18px;padding:20px;margin-bottom:15px;box-shadow:0 5px 20px #0001}
input{padding:12px;border:1px solid #ddd;border-radius:10px;width:250px;max-width:100%;margin:5px}
.badge{display:inline-block;background:#ffd43b;padding:6px 12px;border-radius:20px;font-weight:bold}
.item{background:#f7f7f7;margin:5px 0;padding:8px;border-radius:10px}
.total{color:#dc2626;font-size:20px;font-weight:bold}
.productForm{background:white;border-radius:18px;padding:20px;margin-bottom:15px;box-shadow:0 5px 20px #0001}
.productGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.productCard{background:white;border-radius:18px;padding:15px;box-shadow:0 5px 20px #0001}
.productCard img{width:100%;height:130px;object-fit:cover;border-radius:12px;background:#eee}
.productForm input{width:100%;box-sizing:border-box}
@media(max-width:800px){.productGrid{grid-template-columns:1fr}}
.bellWrap{position:relative;display:inline-block;margin-right:10px}
.bell{font-size:30px}
.soundBtn{background:#ffd43b;color:#111;border:0;padding:10px 16px;border-radius:20px;font-weight:bold;cursor:pointer;margin:4px}
.bellBadge{
position:absolute;
top:-5px;
right:-8px;
background:#dc2626;
color:white;
border-radius:50%;
padding:2px 7px;
font-size:12px;
font-weight:bold;
display:none
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
<div class="bellWrap">
<span class="bell">🔔</span>
<span class="bellBadge" id="bellBadge">0</span>
</div>
<h2>Trang admin đơn hàng</h2>
</div>
  <div>
    <button class="yellow" onclick="location.href='index.html'">Về trang bán hàng</button>
    <button class="yellow" onclick="location.href='my-orders.html'">Đơn hàng của tôi</button>
    <button class="yellow" onclick="location.href='products-admin.html'">Quản lý sản phẩm</button>
  </div>
</header>

<div class="container">
  <div class="login" id="loginBox">
    <h2>Đăng nhập admin</h2>
    <input type="password" id="password" placeholder="Nhập mật khẩu">
    <button class="green" onclick="login()">Đăng nhập</button>
    <p>Mật khẩu mẫu: <b>123456</b></p>
  </div>

  <div id="adminBox" style="display:none">
    <button class="soundBtn" onclick="enableSound()">🔊 Bật âm thanh thông báo</button>
    <button class="red" onclick="logout()">Đăng xuất</button>
    <button class="red" onclick="clearOrders()">Xóa tất cả đơn</button>
    <h2>🔔 Danh sách đơn hàng</h2>
    <div id="orders"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue, update, remove, push, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxV1X_B1tizqiwPtyIB-djVuluMspJIdc",
  authDomain: "taphoa-9b46c.firebaseapp.com",
  databaseURL: "https://taphoa-9b46c-default-rtdb.firebaseio.com",
  projectId: "taphoa-9b46c",
  storageBucket: "taphoa-9b46c.firebasestorage.app",
  messagingSenderId: "877038942781",
  appId: "1:877038942781:web:0ff77efaa5b10c2b1b4854",
  measurementId: "G-H0HDHPYWX7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_PASSWORD = "123456";
let lastOrderCount = 0;
let soundEnabled = false;
let audioCtx = null;

function enableSound(){
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    soundEnabled = true;
    playNotification();
    alert("Đã bật âm thanh thông báo. Khi có đơn mới, chuông sẽ kêu.");
  }catch(e){
    alert("Trình duyệt không cho bật âm thanh. Hãy kiểm tra âm lượng hoặc đổi trình duyệt.");
  }
}

function playNotification(){
  if(!soundEnabled || !audioCtx) return;

  try{
    const now = audioCtx.currentTime;

    for(let i = 0; i < 3; i++){
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(900, now + i * 0.35);

      gain.gain.setValueAtTime(0.001, now + i * 0.35);
      gain.gain.exponentialRampToValueAtTime(0.35, now + i * 0.35 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.35 + 0.25);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now + i * 0.35);
      osc.stop(now + i * 0.35 + 0.28);
    }
  }catch(e){}
}

function updateBell(count){
  const badge = document.getElementById("bellBadge");

  if(count > 0){
    badge.style.display = "block";
    badge.innerText = count;
  }else{
    badge.style.display = "none";
  }
}


function money(n){ return Number(n || 0).toLocaleString("vi-VN") + "đ"; }

function login(){
  const pass = document.getElementById("password").value;
  if(pass === ADMIN_PASSWORD){
    sessionStorage.setItem("adminLogin","true");
    showAdmin();
  }else{
    alert("Sai mật khẩu.");
  }
}

function logout(){
  sessionStorage.removeItem("adminLogin");
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("adminBox").style.display = "none";
}

function showAdmin(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminBox").style.display = "block";
  setupImageUpload();
  renderOrders();
}


function renderOrders(){
  const box = document.getElementById("orders");

  onValue(ref(db, "orders"), snapshot => {
    const data = snapshot.val();

    if(!data){
      box.innerHTML = "<p>Chưa có đơn hàng nào.</p>";
      return;
    }

    const orders = Object.entries(data).reverse();

    if(lastOrderCount !== 0 && orders.length > lastOrderCount){
      playNotification();
    }

    lastOrderCount = orders.length;
    updateBell(orders.length);

    box.innerHTML = orders.map(([id, o]) => `
      <div class="order">
        <h3>Đơn #${id}</h3>
        <span class="badge">${o.status || "Đơn mới"}</span>
        <p><b>Khách hàng:</b> ${o.name || ""}</p>
        <p><b>Số điện thoại:</b> ${o.phone || ""}</p>
        <p><b>Địa chỉ:</b> ${o.address || ""}</p>
        <p><b>Giờ khách muốn giao:</b> ${o.deliveryTime || "Không chọn"}</p>
        <p><b>Thời gian đặt:</b> ${o.time || ""}</p>

        <h4>Sản phẩm:</h4>
        ${(o.cart || []).map(i => `
          <div class="item">
            ${i.name} x ${i.qty} - ${money(i.price * i.qty)}
          </div>
        `).join("")}

        <p class="total">Tổng tiền: ${money(o.total)}</p>

        <button class="green" onclick="updateStatus('${id}', 'Đang xử lý')">Đang xử lý</button>
        <button class="green" onclick="updateStatus('${id}', 'Đang giao')">Đang giao</button>
        <button class="green" onclick="updateStatus('${id}', 'Đã giao')">Đã giao</button>
        <button class="red" onclick="updateStatus('${id}', 'Đã hủy')">Đã hủy</button>
        <button class="red" onclick="deleteOrder('${id}')">Xóa đơn</button>
      </div>
    `).join("");
  });
}

function updateStatus(id, status){
  update(ref(db, "orders/" + id), { status });
}

function deleteOrder(id){
  if(confirm("Bạn muốn xóa đơn này?")){
    remove(ref(db, "orders/" + id));
  }
}

function clearOrders(){
  if(confirm("Xóa tất cả đơn hàng?")){
    remove(ref(db, "orders"));
  }
}

if(sessionStorage.getItem("adminLogin") === "true"){ showAdmin(); }

window.login = login;
window.logout = logout;
window.clearOrders = clearOrders;
window.updateStatus = updateStatus;
window.deleteOrder = deleteOrder;
window.enableSound = enableSound;




</script>

</body>
</html>
