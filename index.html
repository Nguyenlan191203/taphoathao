<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GO Mini Mart</title>
<style>
body{margin:0;font-family:Arial;background:#f4f8f2}
header{background:#00843d;color:white;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.logo{font-size:28px;font-weight:bold}.logo span{color:#ffd43b}
button{border:0;padding:10px 16px;border-radius:20px;font-weight:bold;cursor:pointer}
.yellow{background:#ffd43b}.green{background:#00843d;color:white}.red{background:#dc2626;color:white}.white{background:white;color:#00843d}.gray{background:#e5e7eb;color:#111}
.hero{margin:25px 40px;padding:35px;border-radius:25px;background:linear-gradient(120deg,#00843d,#10b981);color:white}
.layout{margin:25px 40px}
.products{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card,.cartPanel{background:white;border-radius:18px;padding:15px;box-shadow:0 5px 20px #0001}
.card img{width:100%;height:150px;object-fit:cover;border-radius:14px}
.price{color:#dc2626;font-weight:bold}
input,textarea{width:100%;box-sizing:border-box;padding:10px;margin:7px 0;border:1px solid #ddd;border-radius:10px}
.item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:8px 0;gap:8px}
.note{font-size:13px;color:#555}
.cartCount{background:#dc2626;color:white;border-radius:50%;padding:3px 8px;margin-left:5px}
.overlay{display:none;position:fixed;inset:0;background:#0006;z-index:99}
.drawer{position:fixed;right:0;top:0;width:390px;max-width:92%;height:100%;background:#f4f8f2;padding:20px;box-sizing:border-box;overflow:auto;box-shadow:-5px 0 30px #0003}
.drawerHeader{display:flex;justify-content:space-between;align-items:center}
.total{color:#dc2626;font-size:22px;font-weight:bold}
.empty{text-align:center;background:white;padding:30px;border-radius:18px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
#checkoutBox{display:none}
.savedInfo{background:#ecfdf5;border:1px solid #bbf7d0;padding:10px;border-radius:12px;margin:10px 0;color:#166534}
@media(max-width:800px){.products{grid-template-columns:1fr}.hero,.layout{margin:15px}.drawer{width:100%}}
</style>
</head>
<body>

<header>
  <div class="logo">GO<span>Mini</span></div>
  <div>
    <button class="white" onclick="location.href='cart.html'">🛒 Giỏ hàng <span class="cartCount" id="cartCount">0</span></button>
    <button class="yellow" onclick="location.href='my-orders.html'">Đơn hàng của tôi</button>
    
  </div>
</header>

<section class="hero">
  <h1>Siêu thị online giá tốt mỗi ngày</h1>
  <p>Đặt hàng nhanh - giao tận nơi - nhiều ưu đãi.</p>
</section>

<div class="layout">
  <main>
    <h2>Sản phẩm nổi bật</h2>
    <div class="products" id="products"></div>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxV1X_B1tizqiwPtyIB-djVuluMspJIdc",
  authDomain: "taphoa-9b46c.firebaseapp.com",
  databaseURL: "https://taphoa-9b46c-default-rtdb.firebaseio.com",
  projectId: "taphoa-9b46c",
  storageBucket: "taphoa-9b46c.firebasestorage.app",
  messagingSenderId: "877038942781",
  appId: "1:877038942781:web:0ff77efaa5b10c2b1b4854",
  measurementId: "G-H0HDHPYWX7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const products = [
  {id:1,name:"Rau cải ngọt",price:18000,img:"https://images.unsplash.com/photo-1576045057995-568f588f82fb?auto=format&fit=crop&w=500&q=80"},
  {id:2,name:"Thịt ba chỉ",price:125000,img:"https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?auto=format&fit=crop&w=500&q=80"},
  {id:3,name:"Cá hồi phi lê",price:189000,img:"https://images.unsplash.com/photo-1599084993091-1cb5c0721cc6?auto=format&fit=crop&w=500&q=80"},
  {id:4,name:"Sữa tươi",price:36000,img:"https://images.unsplash.com/photo-1563636619-e9143da7973b?auto=format&fit=crop&w=500&q=80"},
  {id:5,name:"Nước cam",price:22000,img:"https://images.unsplash.com/photo-1600271886742-f049cd451bba?auto=format&fit=crop&w=500&q=80"},
  {id:6,name:"Gạo thơm 5kg",price:145000,img:"https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&w=500&q=80"}
];

let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function money(n){ return n.toLocaleString("vi-VN") + "đ"; }

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function openCart(){
  document.getElementById("cartOverlay").style.display = "block";
}

function closeCart(){
  document.getElementById("cartOverlay").style.display = "none";
  closeCheckout();
}

function goCheckout(){
  if(cart.length === 0){
    alert("Giỏ hàng đang trống.");
    return;
  }
  saveCart();
  location.href = "checkout.html";
}

function showCheckout(){
  if(cart.length === 0){
    alert("Giỏ hàng đang trống.");
    return;
  }
  loadCustomerInfo();
  document.getElementById("checkoutBox").style.display = "block";
}

function closeCheckout(){
  document.getElementById("checkoutBox").style.display = "none";
}

function renderProducts(){
  document.getElementById("products").innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p class="price">${money(p.price)}</p>
      <button class="yellow" onclick="addCart(${p.id})">Thêm vào giỏ</button>
    </div>
  `).join("");
}

function addCart(id){
  const product = products.find(p => p.id === id);
  const item = cart.find(i => i.id === id);
  if(item){ item.qty++; } else { cart.push({...product, qty:1}); }
  saveCart();
  renderCart();
}

function increaseQty(id){
  const item = cart.find(i => i.id === id);
  if(item){ item.qty++; }
  saveCart();
  renderCart();
}

function decreaseQty(id){
  const item = cart.find(i => i.id === id);
  if(!item) return;
  item.qty--;
  if(item.qty <= 0){ removeCart(id); } else { saveCart(); renderCart(); }
}

function removeCart(id){
  cart = cart.filter(i => i.id !== id);
  saveCart();
  renderCart();
}

function renderCart(){
  const count = cart.reduce((sum,i)=>sum+i.qty,0);
  document.getElementById("cartCount").innerText = count;
}

function formatDeliveryTime(value){
  if(!value) return "Không chọn";
  return new Date(value).toLocaleString("vi-VN");
}

function saveMyOrderId(id){
  const ids = JSON.parse(localStorage.getItem("myOrderIds") || "[]");
  if(!ids.includes(id)){
    ids.unshift(id);
    localStorage.setItem("myOrderIds", JSON.stringify(ids));
  }
}

function getCustomerInfo(){
  return JSON.parse(localStorage.getItem("customerInfo") || "{}");
}

function hasSavedCustomerInfo(){
  const info = getCustomerInfo();
  return !!(info.name && info.phone && info.address);
}

function loadCustomerInfo(){
  const info = getCustomerInfo();

  document.getElementById("name").value = info.name || "";
  document.getElementById("phone").value = info.phone || "";
  document.getElementById("address").value = info.address || "";

  if(hasSavedCustomerInfo()){
    document.getElementById("savedCustomerBox").style.display = "block";
    document.getElementById("editCustomerBox").style.display = "none";

    document.getElementById("savedName").innerText = info.name;
    document.getElementById("savedPhone").innerText = info.phone;
    document.getElementById("savedAddress").innerText = info.address;
  }else{
    document.getElementById("savedCustomerBox").style.display = "none";
    document.getElementById("editCustomerBox").style.display = "block";
  }
}

function showEditCustomerForm(){
  const info = getCustomerInfo();

  document.getElementById("name").value = info.name || "";
  document.getElementById("phone").value = info.phone || "";
  document.getElementById("address").value = info.address || "";

  document.getElementById("savedCustomerBox").style.display = "none";
  document.getElementById("editCustomerBox").style.display = "block";
}

function saveCustomerInfo(){
  const info = {
    name: document.getElementById("name").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    address: document.getElementById("address").value.trim()
  };

  localStorage.setItem("customerInfo", JSON.stringify(info));
  alert("Đã lưu thông tin khách hàng.");
  loadCustomerInfo();
}

function submitOrder(name, phone, address, deliveryTimeValue){
  if(!name || !phone || !address){
    alert("Vui lòng nhập đầy đủ thông tin.");
    return;
  }

  if(cart.length === 0){
    alert("Giỏ hàng đang trống.");
    return;
  }

  localStorage.setItem("customerInfo", JSON.stringify({name, phone, address}));

  const newOrder = {
    name,
    phone,
    address,
    deliveryTime: formatDeliveryTime(deliveryTimeValue),
    cart,
    total: cart.reduce((sum,i)=>sum+i.price*i.qty,0),
    status: "Đơn mới",
    time: new Date().toLocaleString("vi-VN")
  };

  push(ref(db, "orders"), newOrder)
    .then((result) => {
      saveMyOrderId(result.key);
      alert("Đặt hàng thành công! Thông tin của bạn đã được lưu lại cho lần sau.");

      cart = [];
      renderCart();

      document.getElementById("deliveryTime").value = "";
      document.getElementById("deliveryTimeSaved").value = "";
      closeCart();

      location.href = "my-orders.html";
    })
    .catch((error) => {
      alert("Lỗi gửi đơn: " + error.message);
    });
}

function orderWithSavedInfo(){
  const info = getCustomerInfo();
  const deliveryTimeValue = document.getElementById("deliveryTimeSaved").value;
  submitOrder(info.name, info.phone, info.address, deliveryTimeValue);
}

function order(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();
  const deliveryTimeValue = document.getElementById("deliveryTime").value;

  submitOrder(name, phone, address, deliveryTimeValue);
}


window.openCart = openCart;
window.closeCart = closeCart;
window.goCheckout = goCheckout;
window.showCheckout = showCheckout;
window.closeCheckout = closeCheckout;
window.addCart = addCart;
window.removeCart = removeCart;
window.increaseQty = increaseQty;
window.decreaseQty = decreaseQty;
window.order = order;
window.orderWithSavedInfo = orderWithSavedInfo;
window.showEditCustomerForm = showEditCustomerForm;
window.saveCustomerInfo = saveCustomerInfo;

renderProducts();
renderCart();
</script>

</body>
</html>
