<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TẠP HÓA THẢO</title>
<style>
body{margin:0;font-family:Arial;background:#f4f8f2}
header{background:#00843d;color:white;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.logo{font-size:28px;font-weight:bold}.logo span{color:#ffd43b}
button{border:0;padding:10px 16px;border-radius:20px;font-weight:bold;cursor:pointer}
.yellow{background:#ffd43b}.green{background:#00843d;color:white}.red{background:#dc2626;color:white}.white{background:white;color:#00843d}
.hero{margin:25px 40px;padding:35px;border-radius:25px;background:linear-gradient(120deg,#00843d,#10b981);color:white}
.layout{margin:25px 40px}
.products{display:grid;grid-template-columns:repeat(5,1fr);gap:22px}
.card{background:white;border-radius:18px;padding:15px; min-height:280px;box-shadow:0 5px 20px #0001;  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center; gap:4px;}
  .card h3{
  margin:10px 0 5px;
  font-size:18px;
}

.card p{
  margin:4px 0;
}
.card img{width:90%;height:250px;object-fit:cover;border-radius:14px;background:#eee}
.price{color:#dc2626;font-weight:bold}
.cartCount{background:#dc2626;color:white;border-radius:50%;padding:3px 8px;margin-left:5px}
.loading{background:white;border-radius:18px;padding:25px;text-align:center;grid-column:1/-1}
@media(max-width:800px){.products{grid-template-columns:repeat(2,1fr);gap:22px}.hero,.layout{margin:15px}.logo{font-size:18px}
.card img{height:210px;width:100%;border-radius:10px;}
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
  }

  header > div:last-child{
    margin-left:auto;
    display:flex;
    gap:6px;
    align-items:center;
  }

  header .white{
    font-size:0;
    width:35px;
    height:35px;
    padding:0;
    border-radius:50%;
  }

  header .white::before{
    content:"🛒";
    font-size:20px;
  }

  header .cartCount{
    font-size:11px;
    position:absolute;
    margin-left:-8px;
    margin-top:-8px;
  }

  header .yellow{
    font-size:12px;
    padding:8px 10px;
    border-radius:18px;
    white-space:nowrap;
  }

  .logo{
    font-size:20px;
  }
.hero h1{font-size: 17px;}}
.searchBox{
  margin:20px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.searchBox input{
  width:80%;
  padding:16px;
  border-radius:16px;
  border:2px solid #00843d;
  font-size:16px;
  outline:none;
  box-sizing:border-box;
}
</style>
</head>
<body>

<header>
  <div class="logo">TẠP HÓA THẢO</div>
  <div>
    <button class="white" onclick="location.href='cart.html'">🛒 Giỏ hàng <span class="cartCount" id="cartCount">0</span></button>
    <button class="yellow" onclick="location.href='my-orders.html'">Đơn hàng của tôi</button>
    
  </div>
</header>

<section class="hero">
  <h1>Mua hàng online giá tốt mỗi ngày</h1>
  <p>Đặt hàng nhanh - giao tận nơi - nhiều ưu đãi.</p>
</section>

<div class="searchBox">
  <input 
    type="text" 
    id="searchInput"
    placeholder="🔍 Tìm kiếm sản phẩm..."
    onkeyup="searchProducts()"
  >
</div>

<div class="layout">
  <main>
    <h2>Sản phẩm nổi bật</h2>
    <div class="products" id="products">
      <div class="loading"></div>
    </div>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
let filteredProducts = [];

const firebaseConfig = {
  apiKey: "AIzaSyAxV1X_B1tizqiwPtyIB-djVuluMspJIdc",
  authDomain: "taphoa-9b46c.firebaseapp.com",
  databaseURL: "https://taphoa-9b46c-default-rtdb.firebaseio.com",
  projectId: "taphoa-9b46c",
  storageBucket: "taphoa-9b46c.firebasestorage.app",
  messagingSenderId: "877038942781",
  appId: "1:877038942781:web:0ff77efaa5b10c2b1b4854",
  measurementId: "G-H0HDHPYWX7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let products = [];
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function money(n){
  return Number(n || 0).toLocaleString("vi-VN") + "đ";
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCartCount(){
  const count = cart.reduce((sum,i)=>sum+Number(i.qty || 0),0);
  document.getElementById("cartCount").innerText = count;
}

function loadProducts(){
  const box = document.getElementById("products");

  onValue(ref(db, "products"), snapshot => {
    const data = snapshot.val();

    if(!data){
      box.innerHTML = `<div class="loading">Chưa có sản phẩm nào. Hãy thêm sản phẩm trong trang admin.</div>`;
      return;
    }

    products = Object.entries(data).map(([id, p]) => ({
      id: id,
      name: p.name || "Sản phẩm",
      price: Number(p.price || 0),
      img: p.img || ""
      
    }));
filteredProducts = [...products];
    renderProducts();
    function searchProducts(){

  const keyword = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  filteredProducts = products.filter(p =>
    p.name.toLowerCase().includes(keyword)
  );

  renderProducts();
}

window.searchProducts = searchProducts;
  }, error => {
    box.innerHTML = `<div class="loading">Lỗi tải sản phẩm: ${error.message}</div>`;
  });
}

function renderProducts(){
  const box = document.getElementById("products");

  if(filteredProducts.length === 0){
    box.innerHTML = `<div class="loading">Chưa có sản phẩm nào.</div>`;
    return;
  }

  box.innerHTML = filteredProducts.map(p => `
    <div class="card">
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/500x300?text=San+pham'">
      <h3>${p.name}</h3>
      <p class="price">${money(p.price)}</p>
      <button class="yellow" onclick="addCart('${p.id}')">Thêm vào giỏ</button>
    </div>
  `).join("");
}

function addCart(id){
  const product = products.find(p => p.id === id);
  if(!product){
    alert("Không tìm thấy sản phẩm.");
    return;
  }

  const item = cart.find(i => i.id === id);

  if(item){
    item.qty++;
  }else{
    cart.push({
      id: product.id,
      name: product.name,
      price: product.price,
      img: product.img,
      qty: 1
    });
  }

  saveCart();
  renderCartCount();
}

window.addCart = addCart;

loadProducts();
renderCartCount();
</script>

</body>
</html>
