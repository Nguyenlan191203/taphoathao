<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giỏ hàng</title>
<style>
body{margin:0;font-family:Arial;background:#f4f8f2;padding-bottom:100px}
header{background:#00843d;color:white;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
button{border:0;padding:10px 16px;border-radius:20px;font-weight:bold;cursor:pointer;margin:4px}
.yellow{background:#ffd43b}.green{background:#00843d;color:white}.red{background:#dc2626;color:white}.gray{background:#e5e7eb}
.container{margin:25px 40px}
.card{background:white;border-radius:18px;padding:18px;margin-bottom:15px;box-shadow:0 5px 20px #0001}
.item{display:grid;grid-template-columns:90px 1fr auto;gap:14px;align-items:center;border-bottom:1px solid #eee;padding:12px 0}
.item img{width:85px;height:75px;object-fit:cover;border-radius:12px}
.price{color:#dc2626;font-weight:bold}
.totalBox{position:fixed;left:0;right:0;bottom:0;background:white;padding:14px 40px;display:grid;grid-template-columns:1fr 250px;gap:15px;align-items:center;box-shadow:0 -4px 15px #0002}
.total{font-size:26px;color:#dc2626;font-weight:bold}
.empty{text-align:center;padding:40px}
@media(max-width:700px){
  .container{margin:15px}
  header{padding:15px}
  .item{grid-template-columns:70px 1fr}
  .itemActions{grid-column:1/3}
  .totalBox{grid-template-columns:1fr;padding:12px 15px}
}
</style>
</head>
<body>

<header>
  <h2>🛒 Giỏ hàng</h2>
  <div>
    <button class="yellow" onclick="location.href='index.html'">Tiếp tục mua</button>
    <button class="yellow" onclick="location.href='my-orders.html'">Đơn hàng của tôi</button>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>Sản phẩm trong giỏ</h2>
    <div id="cartList"></div>
  </div>
</div>

<div class="totalBox">
  <div>
    <b>Tổng thanh toán tạm tính</b><br>
    <span class="total" id="total">0đ</span>
  </div>
  <button class="green" onclick="goCheckout()">Đặt hàng</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function money(n){
  return Number(n || 0).toLocaleString("vi-VN") + "đ";
}

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function increaseQty(id){
  const item = cart.find(i => i.id === id);
  if(item) item.qty++;
  saveCart();
  renderCart();
}

function decreaseQty(id){
  const item = cart.find(i => i.id === id);
  if(!item) return;
  item.qty--;
  if(item.qty <= 0){
    removeCart(id);
  }else{
    saveCart();
    renderCart();
  }
}

function removeCart(id){
  cart = cart.filter(i => i.id !== id);
  saveCart();
  renderCart();
}

function clearCart(){
  if(confirm("Xóa toàn bộ giỏ hàng?")){
    cart = [];
    saveCart();
    renderCart();
  }
}

function renderCart(){
  const box = document.getElementById("cartList");

  if(cart.length === 0){
    box.innerHTML = `
      <div class="empty">
        <h3>Giỏ hàng đang trống.</h3>
        <button class="green" onclick="location.href='index.html'">Mua hàng ngay</button>
      </div>
    `;
    document.getElementById("total").innerText = "0đ";
    return;
  }

  box.innerHTML = cart.map(i => `
    <div class="item">
      <img src="${i.img}">
      <div>
        <h3>${i.name}</h3>
        <p>Đơn giá: <span class="price">${money(i.price)}</span></p>
        <p>Số lượng: <b>${i.qty}</b></p>
        <p>Thành tiền: <span class="price">${money(i.price * i.qty)}</span></p>
      </div>
      <div class="itemActions">
        <button class="yellow" onclick="decreaseQty(${i.id})">-</button>
        <button class="yellow" onclick="increaseQty(${i.id})">+</button>
        <button class="red" onclick="removeCart(${i.id})">Xóa</button>
      </div>
    </div>
  `).join("") + `
    <br>
    <button class="red" onclick="clearCart()">Xóa toàn bộ giỏ hàng</button>
  `;

  const total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);
  document.getElementById("total").innerText = money(total);
}

function goCheckout(){
  if(cart.length === 0){
    alert("Giỏ hàng đang trống.");
    return;
  }
  location.href = "checkout.html";
}

renderCart();
</script>

</body>
</html>
